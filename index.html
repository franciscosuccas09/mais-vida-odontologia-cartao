<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100vh;background:transparent;font-family:'Inter',system-ui,sans-serif;}
img{max-width:100%;display:block;}
svg{display:block;overflow:visible;}
main{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:32px 16px;}
#card{width:100%;max-width:28rem;background:#fff;border-radius:32px;box-shadow:0 1px 2px rgba(0,0,0,0.04),0 8px 24px -12px rgba(0,0,0,0.10);overflow:hidden;padding:56px 40px;text-align:center;position:relative;}
#card::before{content:'';position:absolute;inset:12px;border:1px solid rgba(200,205,200,0.5);border-radius:26px;pointer-events:none;}
.brand{color:rgb(5,17,173);font-size:9.6px;letter-spacing:4.8px;text-transform:uppercase;margin-bottom:16px;}
.name{font-family:'Space Grotesk',sans-serif;font-size:30px;line-height:1.25;letter-spacing:-0.02em;margin:0 0 16px;}
.greeting{font-family:'Space Grotesk',sans-serif;font-size:16px;font-style:italic;color:#6b7280;margin:0 0 28px;}
.avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;margin:0 auto 24px;box-shadow:0 0 0 4px rgba(100,180,50,0.25);}
.buttons{display:flex;flex-direction:column;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 20px;border-radius:9999px;font-size:12px;font-weight:500;text-decoration:none;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.btn-wa{background:rgb(25,230,39);color:#1a1a1a;}
.btn-google{background:rgb(26,15,179);color:#fff;}
.btn-contact{background:#f3f4f6;color:#1a1a1a;}
.btn:hover{opacity:0.9;}
</style>
